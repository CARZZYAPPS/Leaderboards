<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboards</title>
<link rel="icon" type="image/x-icon" href="/favicon.png">
<style>
body {
background-color: #0a0a0a;
color: #ffffff;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
display: flex;
flex-direction: column;
align-items: center;
margin: 0;
padding: 50px 20px;
}

h1 {
color: #00d1b2;
text-shadow: 0 0 15px rgba(0, 209, 178, 0.5);
font-size: 2.5rem;
margin-bottom: 10px;
}

.subtitle {
color: #666;
margin-bottom: 40px;
}

.container {
width: 100%;
max-width: 600px;
}

.project-card {
background: #151515;
border: 1px solid #333;
border-radius: 12px;
padding: 20px;
margin-bottom: 20px;
text-decoration: none;
color: white;
display: block;
transition: 0.3s;
}

.project-card:hover {
border-color: #00d1b2;
transform: translateY(-5px);
box-shadow: 0 5px 20px rgba(0, 209, 178, 0.2);
}

.project-title {
color: #00d1b2;
font-weight: bold;
font-size: 1.2rem;
margin-bottom: 5px;
display: block;
}

.project-desc {
font-size: 0.9rem;
color: #aaa;
}

/* CONTACT SECTION */
.contact-section {
margin-top: 60px;
text-align: center;
border-top: 1px solid #222;
padding-top: 40px;
width: 100%;
max-width: 400px;
}

.contact-btn {
display: inline-block;
background: transparent;
color: #00d1b2;
border: 2px solid #00d1b2;
padding: 15px 30px;
border-radius: 50px;
text-decoration: none;
font-weight: bold;
transition: 0.3s;
margin-top: 10px;
}

.contact-btn:hover {
background: #00d1b2;
color: #0a0a0a;
box-shadow: 0 0 20px rgba(0, 209, 178, 0.4);
}

.footer {
margin-top: 50px;
font-size: 0.8rem;
color: #444;
}
#logo {
position:absolute; 
top:20px; 
left:20px;
}
</style>
</head>
<body>

<div id="logo">
<a href="https://carzzyapps.github.io"><img src="/Carzzy Apps Logo.png" style="width:150px;height:50px;"></a>
</div>
<h1>Leaderboards</h1>
<p class="subtitle">Leaderboards For Our Games & Apps</p>

<div class="container">

<!-- PROJECT 1.1 -->
<a href="https://carzzyapps.github.io/RDJ-Scores/" class="project-card">
<span class="project-title">Rhythm DJ</span>
<span class="project-desc">Rhythm DJ Leaderboard</span><br>
<span class="project-desc">Send your top scores to be featured.</span>
</a>



<!-- PROJECT 6.1 -->
<a href="https://carzzyapps.github.io/DCB-Scores/" class="project-card">
<span class="project-title">DeCrossyBus</span>
<span class="project-desc">DeCrossyBus Leaderboard</span><br>
<span class="project-desc">Send your top scores to be featured.</span><br>
</a>

</div>

<div class="footer">
Avis & DeBus | v1.0.0 PRO
</div>

</body>
</html>
