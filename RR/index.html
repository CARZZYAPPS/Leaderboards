<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rhythm Runner | Leaderboard</title>
  <link rel="icon" href="/favicon.png">
  <link rel="stylesheet" href="/nav-bar.css">

  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 40px;
      user-select: none;
    }

    h1 {
      color: #00d1b2;
      margin-bottom: 10px;
    }

    table {
      width: 90%;
      max-width: 600px;
      margin: auto;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 18px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #00d1b2;
    }

    th {
      color: transparent;
      font-size: 20px;
    }

    tr:nth-child(odd) {
      background: rgba(0, 209, 178, 0.1);
    }

    #loading {
      margin-top: 30px;
      color: #00d1b2;
      font-size: 20px;
    }
    footer {
      margin-top: 50px;
      font-size: 0.8rem;
      color: #444;
    }
    
  </style>
</head>
<body>
      <nav>
        <a class="logo" href="/"><img src="https://carzzyapps.github.io/Carzzy Apps Logo.png" style="width:150px;height:50px;"></a>
        <h1 class="nav-head">Carzzy Apps</h1>
        <span class="nav-links">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="Leaderboards">Leaderboards</a>
            <a class="nav-link" href="scymores-games">Scymore's Games</a>
        </span>
    </nav>

  <h1>RHYTHM RUNNER — GLOBAL LEADERBOARD</h1>

  <div id="loading">Loading leaderboard...</div>

  <table style="display:none;" id="leaderboardTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Username</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody id="leaderboard"></tbody>
  </table>
  <footer>
    Avis & DeBus v1.0.0 PRO
  </footer>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxwdmXDPCHPhqRjF8GyP89gcyZpqHLA6Ay_mA4NGRVUX5cOqFyJOhH1NFHJCEiuuxZboQ/exec";

    async function loadLeaderboard() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        const tbody = document.getElementById("leaderboard");
        tbody.innerHTML = "";

        data.forEach((row, i) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${i + 1}</td>
            <td>${row.username}</td>
            <td>${row.score}</td>
          `;
          tbody.appendChild(tr);
        });

        document.getElementById("loading").style.display = "none";
        document.getElementById("leaderboardTable").style.display = "table";

      } catch (err) {
        document.getElementById("loading").innerText = "Failed to load leaderboard.";
      }
    }

    loadLeaderboard();
  </script>

</body>
</html>
