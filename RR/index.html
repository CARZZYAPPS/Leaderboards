<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Game Leaderboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding-top: 40px;
    }

    .leaderboard-wrapper {
      background: #1f2937;
      padding: 24px 32px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      width: 420px;
    }

    h1 {
      margin-top: 0;
      text-align: center;
      font-size: 24px;
      letter-spacing: 0.05em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    th, td {
      padding: 8px 10px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #374151;
      font-weight: 600;
    }

    tr:nth-child(even) td {
      background: #111827;
    }

    tr:nth-child(odd) td {
      background: #1f2937;
    }

    .rank {
      width: 50px;
      text-align: center;
    }

    .username {
      width: 180px;
    }

    .score {
      width: 80px;
      text-align: right;
    }

    .timestamp {
      font-size: 12px;
      color: #9ca3af;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      text-align: center;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="leaderboard-wrapper">
    <h1>Leaderboard</h1>
    <div class="status" id="status">Loading leaderboard...</div>
    <table>
      <thead>
        <tr>
          <th class="rank">#</th>
          <th class="username">Username</th>
          <th class="score">Score</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body">
        <!-- Rows injected by JS -->
      </tbody>
    </table>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzMkYex71b1PMQA951_AhanYyuZO-yXTJnO1WZrLk1SjBQ7bc6VFqJg7-uwTGN5en38ew/exec";

    async function loadLeaderboard() {
      const statusEl = document.getElementById("status");
      const tbody = document.getElementById("leaderboard-body");

      statusEl.textContent = "Loading leaderboard...";

      try {
        const response = await fetch(API_URL);
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        const data = await response.json();

        // Clear existing rows
        tbody.innerHTML = "";

        if (!data || data.length === 0) {
          statusEl.textContent = "No scores yet. Be the first!";
          return;
        }

        data.forEach((player, index) => {
          const tr = document.createElement("tr");

          const rankTd = document.createElement("td");
          rankTd.className = "rank";
          rankTd.textContent = index + 1;

          const userTd = document.createElement("td");
          userTd.className = "username";
          userTd.textContent = player.username ?? "Unknown";

          const scoreTd = document.createElement("td");
          scoreTd.className = "score";
          scoreTd.textContent = player.score ?? 0;

          const timeTd = document.createElement("td");
          const ts = player.timestamp || "";
          timeTd.innerHTML = `<span class="timestamp">${ts}</span>`;

          tr.appendChild(rankTd);
          tr.appendChild(userTd);
          tr.appendChild(scoreTd);
          tr.appendChild(timeTd);

          tbody.appendChild(tr);
        });

        statusEl.textContent = `Loaded ${data.length} players`;
      } catch (err) {
        console.error(err);
        statusEl.textContent = "Error loading leaderboard.";
      }
    }

    window.addEventListener("load", loadLeaderboard);
  </script>
</body>
</html>
