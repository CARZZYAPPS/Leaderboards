<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rhythm Runner | Leaderboard</title>

  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 40px;
      user-select: none;
    }

    h1 {
      color: #00d1b2;
      margin-bottom: 10px;
    }

    table {
      width: 90%;
      max-width: 600px;
      margin: auto;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 18px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #00d1b2;
    }

    th {
      color: #00d1b2;
      font-size: 20px;
    }

    tr:nth-child(even) {
      background: rgba(0, 209, 178, 0.1);
    }

    #loading {
      margin-top: 30px;
      color: #00d1b2;
      font-size: 20px;
    }
  </style>
</head>
<body>

  <h1>RHYTHM RUNNER — GLOBAL LEADERBOARD</h1>
  <p>Top players ranked by highest score</p>

  <div id="loading">Loading leaderboard...</div>

  <table style="display:none;" id="leaderboardTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Username</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody id="leaderboard"></tbody>
  </table>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxwdmXDPCHPhqRjF8GyP89gcyZpqHLA6Ay_mA4NGRVUX5cOqFyJOhH1NFHJCEiuuxZboQ/exec";

    async function loadLeaderboard() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        const tbody = document.getElementById("leaderboard");
        tbody.innerHTML = "";

        data.forEach((row, i) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${i + 1}</td>
            <td>${row.username}</td>
            <td>${row.score}</td>
          `;
          tbody.appendChild(tr);
        });

        document.getElementById("loading").style.display = "none";
        document.getElementById("leaderboardTable").style.display = "table";

      } catch (err) {
        document.getElementById("loading").innerText = "Failed to load leaderboard.";
      }
    }

    loadLeaderboard();
  </script>

</body>
</html>
