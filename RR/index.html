    tr:hover, tr:nth-child(even):hover {

    }

    th {

  </style>
</head>
<body>
      <nav>
        <a class="logo" href="/"><img src="https://carzzyapps.github.io/Carzzy Apps Logo.png" style="width:150px;height:50px;"></a>

  <h1>RHYTHM RUNNER — GLOBAL LEADERBOARD</h1>
  <p style="margin-bottom: 30px;">Our leaderboard system isn't perfect, so if there is a bug, let us know in the chatbot.</p>

  <div id="loading">Loading leaderboard...</div>

  <table style="display:none;" id="leaderboardTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Username</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody id="leaderboard"></tbody>
  </table>
  <footer>
    Avis & DeBus v1.0.0 PRO
  </footer>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw9C3MZ9QH2-fBylVy52fMTwNib_NQVVwUp7Eekk_cq-HsMV_WBL2TWU50cGc5CxGT0/exec";

    async function loadLeaderboard() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        const tbody = document.getElementById("leaderboard");
        tbody.innerHTML = "";

        data.forEach((row, i) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${i + 1}</td>
            <td>${row.username}</td>
            <td>${row.score}</td>
          `;
          tbody.appendChild(tr);
        });

        document.getElementById("loading").style.display = "none";
        document.getElementById("leaderboardTable").style.display = "table";

      } catch (err) {
        document.getElementById("loading").innerText = "Failed to load leaderboard.";
      }
    }

    loadLeaderboard();
  </script>
